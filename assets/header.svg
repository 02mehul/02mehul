  <!-- Wave layers -->
  <path d="M0,130 C200,90 400,160 600,130 C800,100 1000,155 1200,120 L1200,200 L0,200 Z" fill="rgba(255,255,255,0.08)"/>
  <path d="M0,150 C250,120 500,175 750,145 C950,122 1100,158 1200,140 L1200,200 L0,200 Z" fill="rgba(255,255,255,0.05)"/>
  <path d="M0,165 C300,185 700,145 1000,168 C1080,172 1150,162 1200,158 L1200,200 L0,200 Z" fill="rgba(255,255,255,0.03)"/>

  <!-- Title -->
  <text x="600" y="88" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" letter-spacing="1"
